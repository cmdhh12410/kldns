name = "kldns-workers"
main = "src/index.ts"
account_id = "0d201b371dca8ce1986cf0bbaba31590"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "kldns-db"
database_id = "d6ec1c0d-0c1e-4b76-886d-48517becd676"

# KV 命名空间绑定
[[kv_namespaces]]
binding = "KV"
id = "0c18af9cfa804fa587589f2441f1671d"
preview_id = "4b02254aa71d4e7ea6029c08fe741c7b"

# 环境变量
[vars]
APP_NAME = "kldns"
APP_MODE = "production"
SECRET_KEY = "kldns-production-secret-key-2026-change-me-please"

# 静态资源 (Assets 模式 - Wrangler v3 推荐)
[assets]
directory = "./web/dist"
not_found_handling = "single-page-application"

# 构建配置
[build]
command = "npm run build:frontend"
