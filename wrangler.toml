name = "kldns-workers"
main = "src/index.ts"
compatibility_date = "2024-06-20"
node_compat = true

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "kldns-db"
database_id = "your-database-id-here"

# KV 命名空间绑定
[[kv_namespaces]]
binding = "KV"
id = "your-kv-namespace-id-here"

# 环境变量
[vars]
APP_NAME = "kldns"
APP_MODE = "production"

# 静态资源配置
[site]
bucket = "./web/dist"

# 构建配置
[build]
command = "npm run build:frontend"
